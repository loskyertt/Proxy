# 4. 代理集合内容（用于自建节点）
# proxies 暂空——节点全部来自 proxy-providers

# 5. 代理组
proxy-groups:
  - name: "Auto"
    type: url-test
    tolerance: 50
    use:
      - provider1
      - provider3
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: false

  - name: "PROXY"
    type: select
    proxies:
      - "Auto"
    use:
      - provider1
      - provider3

  - name: "OpenAI"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider1

  - name: "Claude"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider1

  - name: "GitHub"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider1
      - provider2

  - name: "Netflix"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Disney"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Youtube"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Spotify"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Tiktok"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Telegram"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Twitter"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "Copilot"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

  - name: "OneDrive"
    type: select
    proxies:
      - "PROXY"
    use:
      - provider3

# 6. 代理集合
proxy-providers:
  provider1:
    type: http
    url: "填入你的代理链接"
    path: ./proxy_providers/provider1.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 600
      timeout: 5000
      url: https://www.gstatic.com/generate_204

  provider2:
    type: http
    url: "填入你的代理链接"
    path: ./proxy_providers/provider2.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 600
      timeout: 5000
      url: https://www.gstatic.com/generate_204

  provider3:
    type: http
    url: "填入你的代理链接"
    path: ./proxy_providers/provider3.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 600
      timeout: 5000
      url: https://www.gstatic.com/generate_204

# 7. 规则集
rule-providers:
  lancidr:
    type: http
    behavior: ipcidr
    interval: 86400
    path: ./ruleset/lancidr.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
  private:
    type: http
    behavior: domain
    interval: 86400
    path: ./ruleset/private.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
  direct:
    type: http
    behavior: domain
    interval: 86400
    path: ./ruleset/direct.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
  applications:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/applications.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
  icloud:
    type: http
    behavior: domain
    interval: 86400
    path: ./ruleset/icloud.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
  apple:
    type: http
    behavior: domain
    interval: 86400
    path: ./ruleset/apple.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
  cncidr:
    type: http
    behavior: ipcidr
    interval: 86400
    path: ./ruleset/cncidr.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
  gfw:
    type: http
    behavior: domain
    interval: 86400
    path: ./ruleset/gfw.yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"

