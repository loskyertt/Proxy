## ================= 4. 流量嗅探 =================
##
##  TUN 模式下，开启嗅探可以让 mihomo 通过分析流量特征识别协议，
##  即使用户访问的是 IP（而非域名）也能正确匹配规则。
##  注意: QUIC 嗅探在某些环境下可能导致 UDP 卡顿，默认关闭。

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  # 对这些域名强制进行嗅探（即使 DNS 已经解析出域名）
  force-domain:
    - "+.claude.ai"
    - "+.anthropic.com"
    - "+.openai.com"
    - "+.bing.com"
    - "+.github.com"
    - "+.copilot.microsoft.com"
  # 跳过嗅探的域名
  skip-domain:
    - Mijia Cloud
    - "+.apple.com"
    - "+.push.apple.com"


