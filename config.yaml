## ================= 7. 代理供应商 =================

proxy-providers:
  ## 飞鸟云（50G/月）
  provider1:
    type: http
    url: "填入你的代理链接"
    path: ./proxy_providers/provider1.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 600
      timeout: 5000
      url: https://www.gstatic.com/generate_204

  ## 飞鸟云（400G 不限时）
  provider2:
    type: http
    url: "填入你的代理链接"
    path: ./proxy_providers/provider2.yaml
    interval: 86400
    health-check:
      enable: true
      interval: 600
      timeout: 5000
      url: https://www.gstatic.com/generate_204

  ## 一元机场（500G/月）
