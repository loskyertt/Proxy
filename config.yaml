## ================= 说明 =================
# - 此配置搭配 mihomo 内核使用
# - 可以参考官方配置修改：https://github.com/MetaCubeX/mihomo/blob/Meta/docs/config.yaml
## ================= 说明 =================

# 1. 全局配置
mixed-port: 7890
bind-address: "*"
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""
external-ui: ./ui
find-process-mode: off
tcp-concurrent: true
ipv6: true
keep-alive-interval: 15
unified-delay: true
geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
global-ua: clash.meta
etag-support: true

geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# fakeip 本地存储，省略DNS查询
profile:
  store-selected: true
  store-fake-ip: true

socks-port: 7891

# 2. Tun 配置
tun:
  enable: true
  device: Meta
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  endpoint-independent-nat: true

# 3. DNS 配置
dns:
  enable: true
  prefer-h3: true
  ipv6: true
  listen: ":53"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: true
  use-system-hosts: true

  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - 8.8.8.8

  nameserver:
    - 114.114.114.114
    - 8.8.8.8
    - tls://223.5.5.5:853
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query#h3=true
    - system

  fallback:
    - 8.8.8.8
    - 1.1.1.1

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4

  nameserver-policy:
    "geosite:cn": 223.5.5.5
    "geosite:!cn": 8.8.8.8

  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.pool.ntp.org"
    - "+.ntp.org"
    - "localhost"
    - "127.*"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
    - "*.linksys.com"
    - "*.linksyssmartwifi.com"
    - swscan.apple.com
    - mesu.apple.com
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time1.*.com"
    - "time2.*.com"
    - "time3.*.com"
    - "time4.*.com"
    - "time5.*.com"
    - "time6.*.com"
    - "time7.*.com"
    - "ntp.*.com"
    - "ntp1.*.com"
    - "ntp2.*.com"
    - "ntp3.*.com"
    - "ntp4.*.com"
    - "ntp5.*.com"
    - "ntp6.*.com"
    - "ntp7.*.com"
