## =====================================================================
##  mihomo 裸核配置文件 — Windows TUN 模式
## =====================================================================
##  适用场景: Windows 系统下使用裸核 mihomo 运行 TUN 模式全局代理
##  参考文档: https://wiki.metacubex.one/
##  参考配置: https://github.com/MetaCubeX/mihomo/blob/Meta/docs/config.yaml
## =====================================================================

## ================= 1. 全局配置 =================

# 混合代理端口（HTTP + SOCKS5 共用）
mixed-port: 7890

# SOCKS5 独立端口（某些应用需要单独指定 SOCKS5 代理时使用）
socks-port: 7891

# 允许局域网设备连接此代理
allow-lan: true
bind-address: "*"

# 运行模式: rule（规则匹配）/ global（全局代理）/ direct（全局直连）
mode: rule

# 日志级别: silent / error / warning / info / debug
log-level: info

# API 外部控制（裸核场景通过 http://127.0.0.1:9090/ui 访问面板）
external-controller: 127.0.0.1:9090
secret: ""

# API CORS 配置（允许从 Web 面板跨域访问 API）
external-controller-cors:
  allow-origins:
    - '*'
  allow-private-network: true

# 外部 Web 管理面板（zashboard）
external-ui: ./ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

# 进程匹配（Windows 下建议 strict 以匹配进程名规则）
find-process-mode: strict

# TCP 并发 — 使用 DNS 解析出的所有 IP 并发连接，取最先成功的
tcp-concurrent: true

# IPv6 支持
ipv6: true

# TCP Keep-Alive 间隔（秒）
keep-alive-interval: 15

# 统一延迟显示 — 消除不同类型节点（直连/代理）的握手延迟差异
unified-delay: true

# 全局客户端 TLS 指纹（有助于降低 TLS 握手被识别概率）
global-client-fingerprint: chrome

# GEO 数据模式（true 使用 dat 格式）
geodata-mode: true

# GEO 数据加载模式（memconservative 为内存受限设备优化）
geodata-loader: memconservative

# GEO 数据自动更新
geo-auto-update: true
geo-update-interval: 24

# 自定义 GEO 数据下载地址（需代理访问 CDN）
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# 外部资源下载 UA
global-ua: clash.meta

# ETag 支持（减少重复下载）
etag-support: true

# 本地状态缓存
profile:
  store-selected: true   # 重启后记住节点选择
  store-fake-ip: true    # 保存 fake-ip 映射，避免重复 DNS 查询


## ================= 2. TUN 配置 =================
##
##  Windows 裸核 TUN 模式关键说明:
##    1. mihomo 需要以管理员权限运行（TUN 需要创建虚拟网卡）
##    2. 如果开启了 Windows 防火墙，需在防火墙中放行 mihomo 内核:
##       设置 → Windows 安全中心 → 防火墙和网络保护 → 允许应用通过防火墙
##       → 添加 mihomo.exe（或手动添加放行规则）
##    3. mixed 栈 = TCP 用 system 栈 + UDP 用 gvisor 栈，Windows 下推荐

tun:
  enable: true
  device: Meta                       # TUN 网卡名称
  stack: mixed                       # TCP 走 system 栈, UDP 走 gvisor 栈
  dns-hijack:
    - any:53                         # UDP DNS 劫持
    - tcp://any:53                   # TCP DNS 劫持（防止部分应用绕过）
  auto-route: true                   # 自动设置全局路由
  auto-detect-interface: true        # 自动检测出口网卡
  strict-route: true                 # ★ Windows 下启用防火墙规则防止 DNS 泄露
  mtu: 1500                          # 最大传输单元
  endpoint-independent-nat: false    # 禁用端点无关 NAT（开启会有性能损耗）

  # 排除常见虚拟网卡网段（如 Docker、Hyper-V、VMware 等虚拟网卡）
  # 按需取消注释并调整具体网段
  # route-exclude-address:
  #   - 172.16.0.0/12    # Docker 默认网段
  #   - 192.168.0.0/16   # 内网网段（一般不需要排除，仅当有冲突时）
  #   - 10.0.0.0/8       # 内网网段
  #   - 100.64.0.0/10    # CGNAT 网段


## ================= 3. DNS 配置 =================

dns:
  enable: true
  listen: ":53"                      # DNS 监听地址（TUN dns-hijack 劫持到此端口）
  enhanced-mode: fake-ip             # 使用 Fake-IP 模式
  fake-ip-range: 198.18.0.1/16       # Fake-IP 地址段

  # DNS 缓存算法（arc = Adaptive Replacement Cache，比默认 lru 更高效）
  cache-algorithm: arc

  # 使用配置中的 hosts 和系统 hosts
  use-hosts: true
  use-system-hosts: true

  # DNS over HTTP/3 优先
  # 在 mixed 栈下 (UDP=gvisor) QUIC/H3 稳定性差, 每次尝试 ~3s 超时后才回退到 H2
  # 导致所有 DoH 查询累加严重延迟, 故关闭
  prefer-h3: false

  # IPv6 解析
  ipv6: true

  # 默认 DNS — 用于解析其他 DNS 服务器的域名
  # 注意: 必须为 IP 地址（不能是域名）
  # 去掉 8.8.8.8 — 国内 UDP 到 8.8.8.8 常被限速/抢答, 且只用两条国内 IP 就足够
  # 解析到 doh.pub / dns.alidns.com 等 DNS 服务器域名
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5

  # 主 DNS 服务器
  # fake-ip 模式下不需要 fallback / fallback-filter / nameserver-policy:
  #   国内加密 DNS (DoH) 返回的正确 IP 足以建立 fake-ip 映射,
  #   代理服务器会自行在远端解析域名, 无需本地做 DNS 回退判断.
  #   详见 Meta-Docs 官方示例与 Mihomo 参考配置.
  nameserver:
    - https://doh.pub/dns-query      # DNSPod DoH (国内, 加密, 稳定)
    - https://dns.alidns.com/dns-query # 阿里 DoH (国内, 加密, 稳定)

  # 代理节点域名解析 — 与 nameserver 相同, 确保代理节点域名可解析
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # DNS 直连（direct 规则使用）
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # Fake-IP 过滤列表 — 匹配的域名不返回 Fake-IP，直接使用真实 IP
  # 主要包含: 需要正确获取真实 IP 才能正常工作的服务
  fake-ip-filter:
    ## 局域网/本地
    - "*.lan"
    - "*.localdomain"
    - "*.local"
    - "*.internal"
    - "*.bogon"
    - "home.arpa"
    - "+.m2m"
    - "localhost"
    - "127.*"
    - "::1"

    ## NTP 时间同步
    - "*.pool.ntp.org"
    - "+.pool.ntp.org"
    - "+.ntp.org"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time1.*.com"
    - "time2.*.com"
